name: Sovereign Logic Layer CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Toolchain
        run: |
          sudo apt-get update
          # Install lsb-release and wget to handle the LLVM repo setup
          sudo apt-get install -y lsb-release wget software-properties-common
          
          # Use the official LLVM setup script to get version 20
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          
          # Install the specific versioned binaries
          sudo apt-get install -y clang-format-20 clang-tidy-20 cmake ninja-build iwyu libbenchmark-dev
          
          # Create symlinks so the standard 'clang-format' command points to 'clang-format-20'
          sudo ln -sf /usr/bin/clang-format-20 /usr/bin/clang-format
          sudo ln -sf /usr/bin/clang-tidy-20 /usr/bin/clang-tidy

      - name: 1. Format Audit
        run: |
          # Dry-run format check; fails if code doesn't match .clang-format
          # This ensures the "Immaculate" style is enforced automatically.
          find include examples tests -name "*.hpp" -o -name "*.cpp" | xargs clang-format --dry-run -Werror

      - name: 2. Configure Build (C++23)
        run: |
          # We use Ninja for faster builds and enable clang-tidy for static analysis.
          cmake -B build -G Ninja \
            -DCMAKE_CXX_CLANG_TIDY="clang-tidy" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON

      - name: 3. Compile Sovereign Stack
        run: cmake --build build --parallel $(nproc)

      - name: 4. Execute Physics Barrier Verification
        run: |
          # The 'ctest' command now finds the tests registered in CMake
          cd build
          ctest --output-on-failure

      - name: 5. Execute Performance Gate
        run: |
          # Run the professional suite and save results as JSON
          ./build/benchmarks/porth_perf_suite --benchmark_format=json > benchmarks_report.json
          
          # Run the guard script to verify if we meet the Sovereign limits
          python3 scripts/latency_guard.py benchmarks_report.json

      - name: 6. Generate Sovereign SBOM
        run: |
          # Hardened installation with 3 retries for transient 502 errors
          for i in {1..3}; do
            curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin && break || sleep 5;
          done
          
          syft dir:. -o cyclonedx-json=porth-io-sbom.json

      - name: 7. Audit Sovereign SBOM for Vulnerabilities
        run: |
          # Hardened installation with 3 retries
          for i in {1..3}; do
            curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin && break || sleep 5;
          done
          
          grype sbom:porth-io-sbom.json --fail-on high

      - name: Archive Compliance Artifacts
        # This 'if' check ensures the step only runs on real GitHub servers
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: porth-io-compliance-bundle
          path: |
            porth-io-sbom.json
            BENCHMARKS.md