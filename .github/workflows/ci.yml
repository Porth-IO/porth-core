name: Porth-IO Sovereign CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-and-audit:
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/devcontainers/cpp:1-ubuntu-24.04
      options: --privileged --ulimit memlock=-1:-1
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Sovereign Toolchain
        run: |
          apt-get update
          apt-get install -y \
            linux-headers-generic libbpf-dev clang-20 llvm-20 \
            clang-format-20 clang-tidy-20 libxdp-dev ninja-build \
            pkg-config curl libelf-dev tar nodejs python3 jq \
            libnuma-dev

          # 1. Architecture-aware bpftool installation
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then BPF_ARCH="amd64"; else BPF_ARCH="arm64"; fi
          mkdir -p /tmp/bpftool-download
          curl -L "https://github.com/libbpf/bpftool/releases/download/v7.5.0/bpftool-v7.5.0-${BPF_ARCH}.tar.gz" | tar -xz -C /tmp/bpftool-download
          install -m 755 /tmp/bpftool-download/bpftool /usr/local/bin/bpftool
          
          # 2. Version pinning for Clang tools
          ln -sf /usr/bin/clang-format-20 /usr/bin/clang-format
          ln -sf /usr/bin/clang-tidy-20 /usr/bin/clang-tidy

      - name: 1. Format Audit
        run: |
          find include examples tests -name "*.cpp" -o -name "*.hpp" -o -name "*.c" -o -name "*.h" | xargs clang-format --dry-run -Werror

      - name: 2. Configure Sovereign Build (C++23)
        env:
          CC: clang-20
          CXX: clang++-20
        run: |
          cmake -B build-ci -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_SCAN_FOR_MODULES=OFF \
            -DBPFTOOL=/usr/local/bin/bpftool \
            -DCMAKE_C_FLAGS="-I/usr/include/$(uname -m)-linux-gnu"

      - name: 3. Static Analysis (Clang-Tidy)
        run: |
          # 1. Audit Sovereign Engine & Examples (Maximum Strictness)
          find examples include -name "*.cpp" -not -path "*/build/*" | \
          xargs -r clang-tidy -p build-ci --quiet --warnings-as-errors='*' \
            --header-filter="${{ github.workspace }}/include/porth/.*"

          # 2. Audit Tests (Framework-Aware)
          # We disable checks triggered by Catch2's internal macro expansion
          find tests -name "*.cpp" -not -path "*/build/*" | \
          xargs -r clang-tidy -p build-ci --quiet --warnings-as-errors='*' \
            --header-filter="${{ github.workspace }}/include/porth/.*" \
            --checks="-cppcoreguidelines-avoid-do-while,-bugprone-chained-comparison,-cppcoreguidelines-avoid-goto"

          # 3. Audit eBPF Logic
          ARCH_INC="/usr/include/$(uname -m)-linux-gnu"
          find include -name "*.c" -not -path "*/build/*" | xargs -r clang-tidy -p build-ci --quiet \
            --warnings-as-errors='*' \
            --header-filter="${{ github.workspace }}/include/porth/.*" \
            --checks="-*,clang-diagnostic-*,bugprone-*,performance-*,readability-braces-around-statements" \
            --extra-arg="-xc" \
            --extra-arg="-target" --extra-arg="bpf" \
            --extra-arg="-I$ARCH_INC" \
            --extra-arg="-D__BPF_TRACING__" \
            --extra-arg="-I${{ github.workspace }}/include"

      - name: 4. Compile Sovereign Stack
        run: cmake --build build-ci --parallel $(nproc)

      - name: 5. Execute Physics Barrier Verification (Unit Tests)
        run: ctest --test-dir build-ci --output-on-failure

      - name: 6. Execute Performance Gate
        run: |
          # 1. Run your custom speed test for the console logs
          ./build-ci/benchmarks/porth_bench

          # 2. Run the ACTUAL Google Benchmark suite to generate the JSON
          ./build-ci/benchmarks/porth_perf_suite \
            --benchmark_format=json \
            --benchmark_out=benchmarks_report.json

          # 3. Trigger the Sovereign Latency Guard
          python3 scripts/latency_guard.py benchmarks_report.json
      
      - name: 6.5 Execute Sovereign Resilience Audit
        run: |
          # 1. Ensure the Python environment is ready
          chmod +x scripts/generate_resilience_report.py
          
          # 2. Execute the report generator we built in Phase 2
          # This runs the test_safety_trip binary and produces resilience_report.json
          python3 scripts/generate_resilience_report.py

      - name: 7. Generate Sovereign SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          
          # [World-Class Fix] We pass the exclusions to SYFT, not Grype.
          # We exclude the CI environment, the build caches, and internal GitHub actions
          # so the SBOM ONLY represents the Porth-IO source code and libraries.
          syft dir:. -o cyclonedx-json=porth-io-sbom.json \
            --source-name porth-core \
            --source-version 0.1.0 \
            --exclude "**/build-ci/**" \
            --exclude "**/build-tsan/**" \
            --exclude "**/.github/**" \
            --exclude "**/.act/**" \
            --exclude "**/.cache/**"

      - name: 8. Audit SBOM for Vulnerabilities
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          
          # [World-Class Fix] Generate a strict Grype configuration on the fly.
          # This guarantees Grype will ignore the 'deb' (Ubuntu) and 'github-action' 
          # packages dumped by the CI runner, no matter where they are hidden.
          cat << 'EOF' > .grype.yaml
          ignore:
            - package:
                type: deb
            - package:
                type: github-action
          EOF
          
          # Run the audit using the strict config
          grype sbom:porth-io-sbom.json --fail-on high --config .grype.yaml

      - name: Archive Compliance Artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: porth-io-compliance-bundle
          path: |
            porth-io-sbom.json
            benchmarks_report.json
            resilience_report.json
            build-ci/*.o

  deploy:
    needs: verify-and-audit
    if: github.actor != 'nektos/act' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploying to Production
        run: echo "Deployment Logic Here"