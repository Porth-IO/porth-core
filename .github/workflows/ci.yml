name: Sovereign Logic Layer CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-and-audit:
    name: Standard Audit & Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y lsb-release wget software-properties-common git curl zip unzip tar cmake ninja-build
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y clang-format-20 clang-tidy-20
          sudo ln -sf /usr/bin/clang-format-20 /usr/bin/clang-format
          sudo ln -sf /usr/bin/clang-tidy-20 /usr/bin/clang-tidy

      - name: Setup vcpkg
        run: |
          if [ ! -d "vcpkg" ]; then
            # Simple, fast clone. No specific commit checkouts required anymore.
            git clone --depth 1 https://github.com/microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.sh
          fi

      - name: 1. Format Audit
        run: find include examples tests -name "*.hpp" -o -name "*.cpp" | xargs clang-format --dry-run -Werror

      - name: 2. Configure Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_MAKE_PROGRAM=/usr/bin/ninja \
            -DCMAKE_C_COMPILER=clang-20 \
            -DCMAKE_CXX_COMPILER=clang++-20 \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON

      - name: 3. Compile
        run: cmake --build build --parallel $(nproc)

      - name: 4. Test
        run: cd build && ctest --output-on-failure

      - name: 5. Performance Gate
        run: |
          ./build/benchmarks/porth_perf_suite --benchmark_format=json > benchmarks_report.json
          python3 scripts/latency_guard.py benchmarks_report.json

      - name: 6. Compliance (SBOM)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft dir:. -o cyclonedx-json=porth-io-sbom.json
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype sbom:porth-io-sbom.json --fail-on high

  concurrency-audit:
    name: ThreadSanitizer Race Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y lsb-release wget software-properties-common git curl zip unzip tar cmake ninja-build
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
      - name: Setup vcpkg
        run: |
          if [ ! -d "vcpkg" ]; then
            git clone --depth 1 https://github.com/microsoft/vcpkg.git
            ./vcpkg/bootstrap-vcpkg.sh
          fi
      - name: Build with TSan
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_MAKE_PROGRAM=/usr/bin/ninja \
            -DCMAKE_C_COMPILER=clang-20 \
            -DCMAKE_CXX_COMPILER=clang++-20 \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DBUILD_TESTING=ON
          cmake --build build
      - name: Run Tests
        run: cd build && ctest --output-on-failure